<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline</title>
    <meta name="description" content="Você está offline. Algumas funcionalidades podem não estar disponíveis." />
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, sans-serif; margin: 0; padding: 0; background: #f8fafc; color: #0f172a; }
      .container { max-width: 560px; margin: 10vh auto; background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 10px 20px rgba(2, 6, 23, 0.06); }
      .content { padding: 24px; text-align: center; }
      h1 { font-size: 20px; margin-bottom: 8px; }
      p { font-size: 14px; margin: 0 0 12px; color: #475569; }
      .actions { display: flex; gap: 8px; justify-content: center; }
      .btn { padding: 10px 14px; border-radius: 8px; border: 1px solid #cbd5e1; background: #0ea5e9; color: #fff; cursor: pointer; }
      .btn.secondary { background: #f1f5f9; color: #0f172a; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="content">
        <h1>Você está offline</h1>
        <p>O aplicativo continua disponível com recursos básicos. Tente reconectar para acessar dados atualizados.</p>
        <div class="actions">
          <button class="btn" onclick="location.reload()">Tentar novamente</button>
          <button class="btn secondary" onclick="history.back()">Voltar</button>
        </div>
      </div>
    </div>
  </body>
</html>
