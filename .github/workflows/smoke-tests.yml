name: Smoke Tests

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: smoke-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke tests (SQL)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Start Postgres local e aplicar migrations
        run: |
          supabase db start
          supabase db reset --no-seed

      - name: Run smoke tests
        run: npm run smoke:test
        env:
          SMOKE_TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres

      - name: Stop Postgres local
        if: always()
        run: supabase db stop --no-backup || true
